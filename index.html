<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millo Band</title>

    <link rel="icon" type="image/svg+xml" href="Millo - Logo Hat.svg">
    <link rel="apple-touch-icon" href="Millo - Logo Hat.svg">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://milloband.com/millo-website/">
    <meta property="og:title" content="Millo Band">
    <meta property="og:description" content="Click to enter the official Millo Band website.">
    <meta property="og:image" content="Millo - Logo Hat.svg">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://milloband.com/millo-website/">
    <meta name="twitter:title" content="Millo Band">
    <meta name="twitter:description" content="Click to enter the official Millo Band website.">
    <meta name="twitter:image" content="Millo - Logo Hat.svg">

    <style>
        /* Ensure the entire page takes up exactly 100% of the viewport */
        html, body {
            height: 100%;
            margin: 0;
            background-color: #000000;
        }

        /* Flexbox handles the dead-center alignment */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents accidental scrollbars */
        }

        /* Wrapper for the logo and scanlines */
        .logo-link {
            position: relative;
            display: inline-block;
            max-width: 250px;
            width: 100%;
        }

        .logo {
            display: block; /* Removes weird spacing under images */
            width: 100%;
            height: auto;
            transition: filter 0.3s ease;
        }

        /* The Scanline Overlay Setup */
        .logo-link::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Creates the alternating dark/transparent lines */
            background: repeating-linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0) 0px,
                rgba(0, 0, 0, 0) 2px,
                rgba(0, 0, 0, 0.5) 2px,
                rgba(0, 0, 0, 0.5) 4px
            );
            opacity: 0;
            pointer-events: none; /* Allows the user to click through the scanlines */
            transition: opacity 0.3s ease;
        }

        /* Hover Effect: Pink color with a slight terminal glow */
        .logo-link:hover .logo {
            filter: brightness(0) saturate(100%) invert(70%) sepia(34%) saturate(762%) hue-rotate(302deg) brightness(105%) contrast(103%) drop-shadow(0 0 8px rgba(255, 145, 175, 0.4));
        }

        /* Hover Effect: Reveal and animate the scanlines */
        .logo-link:hover::after {
            opacity: 1;
            animation: scanlines 1s linear infinite;
        }

        /* Slowly pans the scanlines downward */
        @keyframes scanlines {
            from { background-position: 0 0; }
            to { background-position: 0 4px; }
        }
    </style>
</head>
<body>

    <a href="https://milloband.com/millo-website/" class="logo-link">
        <img src="Millo - Logo Hat.svg" alt="Millo Band Logo" class="logo">
    </a>

</body>
</html>
